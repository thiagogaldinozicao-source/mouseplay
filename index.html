<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MousePlay</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐭</text></svg>""")/>>
<script src="https://cdnjs.cloudflare.com"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#080c10; --s1:#0f1318; --s2:#161b22; --s3:#1e2530;
  --acc:#00c2ff; --acc2:#0077ff; --red:#ff3b5c; --txt:#e8edf2;
  --mut:#5a6478; --brd:#1e2530;
}
body{background:var(--bg);color:var(--txt);font-family:system-ui,-apple-system,sans-serif;overflow-x:hidden;min-height:100vh}

/* LOGIN SCREEN */
#sc-login{display:flex;align-items:center;justify-content:center;min-height:100vh;background:#07080a;position:relative}
.login-wrap{width:100%;max-width:380px;padding:20px;z-index:10}
.login-logo{font-size:42px;font-weight:800;text-align:center;background:linear-gradient(135deg,var(--acc),var(--acc2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:30px}
.card{background:rgba(15,19,24,.95);border:1px solid var(--brd);border-radius:14px;padding:28px;box-shadow:0 20px 50px rgba(0,0,0,.5)}
.inp{width:100%;background:var(--s2);border:1px solid var(--brd);border-radius:8px;padding:12px;color:#fff;margin-bottom:15px;outline:none}
.inp:focus{border-color:var(--acc)}
.btn-connect{width:100%;background:linear-gradient(135deg,var(--acc),var(--acc2));border:none;border-radius:8px;padding:14px;color:#000;font-weight:700;cursor:pointer}
.err-box{color:var(--red);font-size:13px;margin-top:10px;text-align:center;display:none}

/* PLAYER AREA */
#sc-main{display:none;width:100vw;height:100vh;background:#000}
video{width:100%;height:100%;background:#000}
.player-error-msg{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;z-index:20;display:none}
</style>
</head>
<body>

<div id="sc-login">
  <div class="login-wrap">
    <div class="login-logo">MousePlay</div>
    <div class="card">
      <input type="text" id="iptv_url" class="inp" placeholder="DNS do Servidor (ex: http://link.com:80)">
      <input type="text" id="iptv_user" class="inp" placeholder="Usuário">
      <input type="password" id="iptv_pass" class="inp" placeholder="Senha">
      <button class="btn-connect" onclick="tentarLogin()">ENTRAR</button>
      <div id="login-err" class="err-box">Erro nas credenciais ou lista expirada.</div>
    </div>
  </div>
</div>

<div id="sc-main">
    <div id="error-display" class="player-error-msg">
        <h1 style="font-size:60px">⚠️</h1>
        <p id="error-text">Erro ao carregar lista (401)</p>
        <button onclick="location.reload()" style="margin-top:15px; padding:10px; cursor:pointer">Voltar</button>
    </div>
    <video id="video" controls autoplay></video>
</div>

<script>
function tentarLogin() {
    const dns = document.getElementById('iptv_url').value;
    const user = document.getElementById('iptv_user').value;
    const pass = document.getElementById('iptv_pass').value;
    const errBox = document.getElementById('login-err');

    if(!dns || !user || !pass) {
        errBox.innerText = "Preencha todos os campos!";
        errBox.style.display = "block";
        return;
    }

    // Monta a URL padrão de canais ao vivo (Xtreme Codes)
    const streamUrl = `${dns}/live/${user}/${pass}/1.m3u8`; 

    document.getElementById('sc-login').style.display = 'none';
    document.getElementById('sc-main').style.display = 'block';

    iniciarPlayer(streamUrl);
}

function iniciarPlayer(url) {
    const video = document.getElementById('video');
    const errorDisplay = document.getElementById('error-display');

    if (Hls.isSupported()) {
        const hls = new Hls();
        hls.loadSource(url);
        hls.attachMedia(video);
        
        hls.on(Hls.Events.ERROR, function (event, data) {
            if (data.response && data.response.code === 401) {
                document.getElementById('error-text').innerText = "Acesso Negado (401). Verifique sua lista.";
                errorDisplay.style.display = 'block';
            } else if (data.fatal) {
                document.getElementById('error-text').innerText = "Erro de conexão com o servidor.";
                errorDisplay.style.display = 'block';
            }
        });
    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = url;
    }
}
</script>
</body>
</html>
